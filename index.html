<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 사주 운세</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="container">
    <header>
      <div class="title-symbol">☯</div>
      <h1>오늘의 사주 운세</h1>
      <p class="subtitle">이름과 생년월일을 입력하면 오늘의 운세를 풀이해드립니다</p>
    </header>

    <section class="form-section">
      <div class="input-group">
        <label for="name">이름</label>
        <input type="text" id="name" placeholder="이름을 입력하세요" maxlength="10" />
      </div>
      <div class="input-group">
        <label>생년월일</label>
        <div class="date-picker-wrapper">
          <input type="text" id="birthdate-display" placeholder="날짜를 선택하세요 📅" readonly />
          <input type="hidden" id="birthdate" />
          <div class="calendar-popup" id="calendar-popup">
            <div class="cal-header">
              <button class="cal-nav" id="cal-prev">‹</button>
              <div class="cal-title">
                <button class="cal-year-btn" id="cal-year-btn"></button>
                <button class="cal-month-btn" id="cal-month-btn"></button>
              </div>
              <button class="cal-nav" id="cal-next">›</button>
            </div>
            <div class="cal-body" id="cal-body"></div>
          </div>
        </div>
      </div>
      <button id="fortune-btn">운세 보기 ✨</button>
    </section>

    <section class="result-section" id="result" style="display:none;">
      <!-- 기본 정보 -->
      <div class="result-header" id="result-header"></div>

      <!-- 속도계 게이지 -->
      <div class="gauge-grid" id="gauge-grid"></div>

      <!-- 오늘의 조언 -->
      <div class="advice-simple" id="advice-simple"></div>

      <!-- 자세히 보기 -->
      <details class="detail-section">
        <summary class="detail-toggle">자세히 보기</summary>
        <div class="detail-content" id="detail-content"></div>
      </details>

      <button class="retry-btn" id="retry-btn">다시 보기</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
